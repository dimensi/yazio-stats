name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            name: yazio-stats-darwin-arm64
          - target: bun-darwin-x64
            name: yazio-stats-darwin-x64
          - target: bun-linux-x64
            name: yazio-stats-linux-x64
          - target: bun-linux-arm64
            name: yazio-stats-linux-arm64
          - target: bun-windows-x64
            name: yazio-stats-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build --compile --target=${{ matrix.target }} --outfile ${{ matrix.name }} src/cli.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: chmod +x artifacts/yazio-stats-*

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
